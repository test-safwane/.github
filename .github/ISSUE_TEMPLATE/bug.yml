name: Bug
description: Signaler un bug
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire pour nous aider à reproduire et corriger le problème.

  - type: input
    id: summary
    attributes:
      label: Résumé
      description: Résume le bug en une phrase
      placeholder: Exemple - Le bouton Enregistrer ne répond plus
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Décris les étapes exactes
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Constater que ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Résultat attendu
      placeholder: Décris le comportement attendu
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Résultat observé
      placeholder: Décris le comportement actuel
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Sévérité
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environnement
      description: Navigateur, OS, version, device, etc.
      placeholder: Exemple - Chrome 135 / Windows 11

  - type: textarea
    id: additional
    attributes:
      label: Informations complémentaires
      placeholder: Logs, captures, contexte, liens...