name: Feature
description: Proposer une nouvelle fonctionnalité
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Exemple - Ajouter l'export PDF
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Todo
        - In Progress
        - Done
    validations:
      required: true

  - type: dropdown
    id: estimate
    attributes:
      label: Estimate
      options:
        - "1"
        - "2"
        - "3"
        - "5"
        - "8"
        - "13"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true

  - type: input
    id: sprint
    attributes:
      label: Sprint
      placeholder: Exemple - Sprint 1
      description: Laisse vide si tu veux utiliser automatiquement le sprint actif

  - type: input
    id: start_date
    attributes:
      label: Start date
      placeholder: YYYY-MM-DD
      description: Laisse vide si tu veux utiliser automatiquement la date du jour

  - type: input
    id: target_date
    attributes:
      label: Target date
      placeholder: YYYY-MM-DD
      description: Laisse vide si tu veux utiliser automatiquement la date du jour

  - type: checkboxes
    id: options
    attributes:
      label: Options
      options:
        - label: Assign me automatically
        - label: Use active sprint
        - label: Use today's date for start and target date

  - type: textarea
    id: details
    attributes:
      label: Details
      placeholder: Décris le besoin, la valeur apportée et le résultat attendu
    validations:
      required: true